<svg viewBox="0 0 1100 800" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <!-- Background -->
  <rect width="1100" height="800" fill="#f5f1e8"/>

  <!-- Title -->
  <text x="550" y="32" text-anchor="middle" font-size="20" font-weight="bold" fill="#2c3e50">
    DOPPELGÄNGER — Wiring Diagram
  </text>
  <text x="550" y="52" text-anchor="middle" font-size="12" fill="#7f8c8d">
    4× NeoPixel GRBW strips · Push button · Control LED · 5V power
  </text>

  <!-- =================== POWER SUPPLY =================== -->
  <g id="psu">
    <rect x="40" y="90" width="150" height="90" fill="#2c3e50" stroke="#1a252f" stroke-width="2" rx="6"/>
    <text x="115" y="115" text-anchor="middle" font-size="13" font-weight="bold" fill="white">5V Power Supply</text>
    <text x="115" y="133" text-anchor="middle" font-size="11" fill="#bdc3c7">(15A recommended)</text>
    <circle cx="70" cy="170" r="6" fill="#e74c3c" stroke="#922b21" stroke-width="1.5"/>
    <text x="70" y="195" text-anchor="middle" font-size="11" font-weight="bold" fill="#c0392b">+5V</text>
    <circle cx="160" cy="170" r="6" fill="#2c3e50" stroke="#000" stroke-width="1.5"/>
    <text x="160" y="195" text-anchor="middle" font-size="11" font-weight="bold" fill="#2c3e50">GND</text>
  </g>

  <!-- Power rails -->
  <line x1="70" y1="176" x2="70" y2="240" stroke="#e74c3c" stroke-width="3"/>
  <line x1="70" y1="240" x2="1040" y2="240" stroke="#e74c3c" stroke-width="3"/>
  <text x="80" y="234" font-size="10" fill="#c0392b" font-weight="bold">+5V rail</text>

  <line x1="160" y1="176" x2="160" y2="260" stroke="#2c3e50" stroke-width="3"/>
  <line x1="160" y1="260" x2="1040" y2="260" stroke="#2c3e50" stroke-width="3"/>
  <text x="170" y="275" font-size="10" fill="#2c3e50" font-weight="bold">GND rail</text>

  <!-- =================== ARDUINO =================== -->
  <g id="arduino">
    <rect x="380" y="320" width="220" height="280" fill="#16a085" stroke="#0e6655" stroke-width="2" rx="8"/>
    <text x="490" y="345" text-anchor="middle" font-size="14" font-weight="bold" fill="white">ARDUINO</text>
    <text x="490" y="362" text-anchor="middle" font-size="11" fill="#d1f2eb">(UNO / Nano / compatible)</text>
    <rect x="585" y="355" width="30" height="22" fill="#7f8c8d" stroke="#34495e" stroke-width="1"/>
    <text x="600" y="370" text-anchor="middle" font-size="8" fill="white">USB</text>

    <circle cx="380" cy="400" r="5" fill="#e74c3c"/>
    <text x="395" y="404" font-size="11" fill="white" font-weight="bold">5V</text>
    <circle cx="380" cy="425" r="5" fill="#2c3e50"/>
    <text x="395" y="429" font-size="11" fill="white" font-weight="bold">GND</text>

    <circle cx="600" cy="400" r="5" fill="#e67e22"/>
    <text x="585" y="404" text-anchor="end" font-size="11" fill="white" font-weight="bold">D2</text>
    <circle cx="600" cy="425" r="5" fill="#9b59b6"/>
    <text x="585" y="429" text-anchor="end" font-size="11" fill="white" font-weight="bold">D3</text>
    <circle cx="600" cy="450" r="5" fill="#27ae60"/>
    <text x="585" y="454" text-anchor="end" font-size="11" fill="white" font-weight="bold">D4</text>
    <circle cx="600" cy="475" r="5" fill="#c0392b"/>
    <text x="585" y="479" text-anchor="end" font-size="11" fill="white" font-weight="bold">D5</text>

    <circle cx="600" cy="520" r="5" fill="#f39c12"/>
    <text x="585" y="524" text-anchor="end" font-size="11" fill="white" font-weight="bold">D7</text>
    <text x="585" y="538" text-anchor="end" font-size="9" fill="#d1f2eb">button</text>

    <circle cx="600" cy="560" r="5" fill="#3498db"/>
    <text x="585" y="564" text-anchor="end" font-size="11" fill="white" font-weight="bold">D8</text>
    <text x="585" y="578" text-anchor="end" font-size="9" fill="#d1f2eb">ctrl LED</text>
  </g>

  <line x1="380" y1="400" x2="340" y2="400" stroke="#e74c3c" stroke-width="2.5"/>
  <line x1="340" y1="400" x2="340" y2="240" stroke="#e74c3c" stroke-width="2.5"/>
  <line x1="380" y1="425" x2="320" y2="425" stroke="#2c3e50" stroke-width="2.5"/>
  <line x1="320" y1="425" x2="320" y2="260" stroke="#2c3e50" stroke-width="2.5"/>

  <!-- =================== LED STRIPS =================== -->
  <g id="strip1">
    <rect x="720" y="80" width="320" height="55" fill="#e67e22" stroke="#a04000" stroke-width="2" rx="8"/>
    <text x="880" y="102" text-anchor="middle" font-size="12" font-weight="bold" fill="white">Strip 1 — Front A-Side</text>
    <text x="880" y="120" text-anchor="middle" font-size="10" fill="#fdebd0">NeoPixel GRBW · 60 LEDs · DIN ← Pin 2</text>
    <g fill="#fff8dc" stroke="#a04000" stroke-width="0.5">
      <circle cx="745" cy="115" r="2.5"/><circle cx="760" cy="115" r="2.5"/><circle cx="775" cy="115" r="2.5"/>
      <circle cx="790" cy="115" r="2.5"/><circle cx="805" cy="115" r="2.5"/><circle cx="820" cy="115" r="2.5"/>
      <circle cx="950" cy="115" r="2.5"/><circle cx="965" cy="115" r="2.5"/><circle cx="980" cy="115" r="2.5"/>
      <circle cx="995" cy="115" r="2.5"/><circle cx="1010" cy="115" r="2.5"/><circle cx="1025" cy="115" r="2.5"/>
    </g>
    <circle cx="720" cy="108" r="4" fill="#e67e22" stroke="#fff" stroke-width="1"/>
    <text x="712" y="112" text-anchor="end" font-size="9" fill="#a04000" font-weight="bold">DIN</text>
    <circle cx="720" cy="122" r="4" fill="#e74c3c" stroke="#fff" stroke-width="1"/>
    <text x="712" y="126" text-anchor="end" font-size="9" fill="#c0392b" font-weight="bold">+5V</text>
    <circle cx="720" cy="136" r="4" fill="#2c3e50" stroke="#fff" stroke-width="1"/>
    <text x="712" y="140" text-anchor="end" font-size="9" fill="#2c3e50" font-weight="bold">GND</text>
  </g>

  <g id="strip2">
    <rect x="720" y="170" width="320" height="55" fill="#9b59b6" stroke="#6c3483" stroke-width="2" rx="8"/>
    <text x="880" y="192" text-anchor="middle" font-size="12" font-weight="bold" fill="white">Strip 2 — Front B-Side</text>
    <text x="880" y="210" text-anchor="middle" font-size="10" fill="#e8daef">NeoPixel GRBW · 60 LEDs · DIN ← Pin 3</text>
    <g fill="#fff8dc" stroke="#6c3483" stroke-width="0.5">
      <circle cx="745" cy="205" r="2.5"/><circle cx="760" cy="205" r="2.5"/><circle cx="775" cy="205" r="2.5"/>
      <circle cx="790" cy="205" r="2.5"/><circle cx="805" cy="205" r="2.5"/><circle cx="820" cy="205" r="2.5"/>
      <circle cx="950" cy="205" r="2.5"/><circle cx="965" cy="205" r="2.5"/><circle cx="980" cy="205" r="2.5"/>
      <circle cx="995" cy="205" r="2.5"/><circle cx="1010" cy="205" r="2.5"/><circle cx="1025" cy="205" r="2.5"/>
    </g>
    <circle cx="720" cy="183" r="4" fill="#9b59b6" stroke="#fff" stroke-width="1"/>
    <circle cx="720" cy="197" r="4" fill="#e74c3c" stroke="#fff" stroke-width="1"/>
    <circle cx="720" cy="211" r="4" fill="#2c3e50" stroke="#fff" stroke-width="1"/>
  </g>

  <g id="strip3">
    <rect x="720" y="370" width="320" height="55" fill="#27ae60" stroke="#1e8449" stroke-width="2" rx="8"/>
    <text x="880" y="392" text-anchor="middle" font-size="12" font-weight="bold" fill="white">Strip 3 — Back A-Side</text>
    <text x="880" y="410" text-anchor="middle" font-size="10" fill="#d5f5e3">NeoPixel GRBW · 60 LEDs · DIN ← Pin 4</text>
    <g fill="#fff8dc" stroke="#1e8449" stroke-width="0.5">
      <circle cx="745" cy="405" r="2.5"/><circle cx="760" cy="405" r="2.5"/><circle cx="775" cy="405" r="2.5"/>
      <circle cx="790" cy="405" r="2.5"/><circle cx="805" cy="405" r="2.5"/><circle cx="820" cy="405" r="2.5"/>
      <circle cx="950" cy="405" r="2.5"/><circle cx="965" cy="405" r="2.5"/><circle cx="980" cy="405" r="2.5"/>
      <circle cx="995" cy="405" r="2.5"/><circle cx="1010" cy="405" r="2.5"/><circle cx="1025" cy="405" r="2.5"/>
    </g>
    <circle cx="720" cy="383" r="4" fill="#27ae60" stroke="#fff" stroke-width="1"/>
    <circle cx="720" cy="397" r="4" fill="#e74c3c" stroke="#fff" stroke-width="1"/>
    <circle cx="720" cy="411" r="4" fill="#2c3e50" stroke="#fff" stroke-width="1"/>
  </g>

  <g id="strip4">
    <rect x="720" y="460" width="320" height="55" fill="#c0392b" stroke="#7b241c" stroke-width="2" rx="8"/>
    <text x="880" y="482" text-anchor="middle" font-size="12" font-weight="bold" fill="white">Strip 4 — Back B-Side</text>
    <text x="880" y="500" text-anchor="middle" font-size="10" fill="#fadbd8">NeoPixel GRBW · 60 LEDs · DIN ← Pin 5</text>
    <g fill="#fff8dc" stroke="#7b241c" stroke-width="0.5">
      <circle cx="745" cy="495" r="2.5"/><circle cx="760" cy="495" r="2.5"/><circle cx="775" cy="495" r="2.5"/>
      <circle cx="790" cy="495" r="2.5"/><circle cx="805" cy="495" r="2.5"/><circle cx="820" cy="495" r="2.5"/>
      <circle cx="950" cy="495" r="2.5"/><circle cx="965" cy="495" r="2.5"/><circle cx="980" cy="495" r="2.5"/>
      <circle cx="995" cy="495" r="2.5"/><circle cx="1010" cy="495" r="2.5"/><circle cx="1025" cy="495" r="2.5"/>
    </g>
    <circle cx="720" cy="473" r="4" fill="#c0392b" stroke="#fff" stroke-width="1"/>
    <circle cx="720" cy="487" r="4" fill="#e74c3c" stroke="#fff" stroke-width="1"/>
    <circle cx="720" cy="501" r="4" fill="#2c3e50" stroke="#fff" stroke-width="1"/>
  </g>

  <!-- Data lines -->
  <path d="M 600 400 L 660 400 L 660 108 L 720 108" stroke="#e67e22" stroke-width="2.5" fill="none"/>
  <path d="M 600 425 L 670 425 L 670 183 L 720 183" stroke="#9b59b6" stroke-width="2.5" fill="none"/>
  <path d="M 600 450 L 680 450 L 680 383 L 720 383" stroke="#27ae60" stroke-width="2.5" fill="none"/>
  <path d="M 600 475 L 690 475 L 690 473 L 720 473" stroke="#c0392b" stroke-width="2.5" fill="none"/>

  <!-- Strip +5V -->
  <line x1="720" y1="122" x2="700" y2="122" stroke="#e74c3c" stroke-width="2.5"/>
  <line x1="700" y1="122" x2="700" y2="240" stroke="#e74c3c" stroke-width="2.5"/>
  <line x1="720" y1="197" x2="700" y2="197" stroke="#e74c3c" stroke-width="2.5"/>
  <line x1="720" y1="397" x2="700" y2="397" stroke="#e74c3c" stroke-width="2.5"/>
  <line x1="700" y1="397" x2="700" y2="240" stroke="#e74c3c" stroke-width="2.5"/>
  <line x1="720" y1="487" x2="700" y2="487" stroke="#e74c3c" stroke-width="2.5"/>

  <!-- Strip GND -->
  <line x1="720" y1="136" x2="710" y2="136" stroke="#2c3e50" stroke-width="2.5"/>
  <line x1="710" y1="136" x2="710" y2="260" stroke="#2c3e50" stroke-width="2.5"/>
  <line x1="720" y1="211" x2="710" y2="211" stroke="#2c3e50" stroke-width="2.5"/>
  <line x1="720" y1="411" x2="710" y2="411" stroke="#2c3e50" stroke-width="2.5"/>
  <line x1="710" y1="411" x2="710" y2="260" stroke="#2c3e50" stroke-width="2.5"/>
  <line x1="720" y1="501" x2="710" y2="501" stroke="#2c3e50" stroke-width="2.5"/>

  <!-- =================== PUSH BUTTON =================== -->
  <g id="button">
    <rect x="180" y="500" width="80" height="60" fill="#34495e" stroke="#1c2833" stroke-width="2" rx="6"/>
    <circle cx="220" cy="530" r="18" fill="#e74c3c" stroke="#922b21" stroke-width="2"/>
    <circle cx="220" cy="530" r="10" fill="#c0392b"/>
    <text x="220" y="580" text-anchor="middle" font-size="11" font-weight="bold" fill="#2c3e50">Push Button</text>
    <text x="220" y="595" text-anchor="middle" font-size="9" fill="#7f8c8d">momentary, normally open</text>
    <circle cx="195" cy="500" r="3" fill="#2c3e50"/>
    <circle cx="245" cy="500" r="3" fill="#f39c12"/>
  </g>

  <g id="pullup">
    <rect x="285" y="640" width="80" height="22" fill="#f9e79f" stroke="#b7950b" stroke-width="1.5" rx="3"/>
    <text x="325" y="655" text-anchor="middle" font-size="10" font-weight="bold" fill="#7d6608">10kΩ pull-up</text>
    <text x="325" y="680" text-anchor="middle" font-size="9" fill="#7f8c8d">(optional — code uses INPUT_PULLUP)</text>
  </g>

  <line x1="195" y1="500" x2="195" y2="470" stroke="#2c3e50" stroke-width="2.5"/>
  <line x1="195" y1="470" x2="160" y2="470" stroke="#2c3e50" stroke-width="2.5"/>
  <line x1="160" y1="470" x2="160" y2="260" stroke="#2c3e50" stroke-width="2.5"/>
  <line x1="245" y1="500" x2="245" y2="520" stroke="#f39c12" stroke-width="2.5"/>
  <line x1="245" y1="520" x2="600" y2="520" stroke="#f39c12" stroke-width="2.5"/>
  <line x1="285" y1="651" x2="265" y2="651" stroke="#f39c12" stroke-width="2" stroke-dasharray="4,3"/>
  <line x1="265" y1="651" x2="265" y2="520" stroke="#f39c12" stroke-width="2" stroke-dasharray="4,3"/>
  <line x1="365" y1="651" x2="385" y2="651" stroke="#e74c3c" stroke-width="2" stroke-dasharray="4,3"/>
  <line x1="385" y1="651" x2="385" y2="240" stroke="#e74c3c" stroke-width="2" stroke-dasharray="4,3"/>

  <!-- =================== CONTROL LED =================== -->
  <g id="ctrl-led">
    <circle cx="220" cy="700" r="14" fill="#5dade2" stroke="#1f618d" stroke-width="2"/>
    <circle cx="220" cy="700" r="6" fill="#aed6f1"/>
    <line x1="213" y1="713" x2="213" y2="735" stroke="#7f8c8d" stroke-width="2"/>
    <line x1="227" y1="713" x2="227" y2="735" stroke="#7f8c8d" stroke-width="2"/>
    <text x="208" y="735" text-anchor="end" font-size="9" fill="#7f8c8d">−</text>
    <text x="232" y="735" font-size="9" fill="#7f8c8d">+</text>
    <text x="220" y="760" text-anchor="middle" font-size="11" font-weight="bold" fill="#2c3e50">Control LED</text>
    <text x="220" y="775" text-anchor="middle" font-size="9" fill="#7f8c8d">indicates IDLE state</text>
  </g>

  <g id="rlimit">
    <rect x="280" y="724" width="70" height="22" fill="#f9e79f" stroke="#b7950b" stroke-width="1.5" rx="3"/>
    <text x="315" y="739" text-anchor="middle" font-size="10" font-weight="bold" fill="#7d6608">220Ω</text>
  </g>

  <line x1="213" y1="735" x2="213" y2="750" stroke="#2c3e50" stroke-width="2.5"/>
  <line x1="213" y1="750" x2="140" y2="750" stroke="#2c3e50" stroke-width="2.5"/>
  <line x1="140" y1="750" x2="140" y2="260" stroke="#2c3e50" stroke-width="2.5"/>
  <line x1="227" y1="735" x2="280" y2="735" stroke="#3498db" stroke-width="2.5"/>
  <line x1="350" y1="735" x2="405" y2="735" stroke="#3498db" stroke-width="2.5"/>
  <line x1="405" y1="735" x2="405" y2="560" stroke="#3498db" stroke-width="2.5"/>
  <line x1="405" y1="560" x2="600" y2="560" stroke="#3498db" stroke-width="2.5"/>

  <!-- =================== LEGEND =================== -->
  <g id="legend">
    <rect x="40" y="640" width="220" height="140" fill="#ffffff" stroke="#bdc3c7" stroke-width="1" rx="6"/>
    <text x="50" y="660" font-size="11" font-weight="bold" fill="#2c3e50">Legend</text>
    <line x1="50" y1="675" x2="80" y2="675" stroke="#e74c3c" stroke-width="2.5"/>
    <text x="88" y="679" font-size="10" fill="#2c3e50">+5V power</text>
    <line x1="50" y1="693" x2="80" y2="693" stroke="#2c3e50" stroke-width="2.5"/>
    <text x="88" y="697" font-size="10" fill="#2c3e50">GND</text>
    <line x1="50" y1="711" x2="80" y2="711" stroke="#e67e22" stroke-width="2.5"/>
    <text x="88" y="715" font-size="10" fill="#2c3e50">data D2–D5 → strips</text>
    <line x1="50" y1="729" x2="80" y2="729" stroke="#f39c12" stroke-width="2.5"/>
    <text x="88" y="733" font-size="10" fill="#2c3e50">D7 button signal</text>
    <line x1="50" y1="747" x2="80" y2="747" stroke="#3498db" stroke-width="2.5"/>
    <text x="88" y="751" font-size="10" fill="#2c3e50">D8 control LED</text>
    <line x1="50" y1="765" x2="80" y2="765" stroke="#7f8c8d" stroke-width="1.5" stroke-dasharray="4,3"/>
    <text x="88" y="769" font-size="10" fill="#2c3e50">optional</text>
  </g>

  <!-- Constraint note -->
  <rect x="380" y="610" width="320" height="40" fill="#fdebd0" stroke="#d68910" stroke-width="1" rx="4"/>
  <text x="540" y="628" text-anchor="middle" font-size="11" font-weight="bold" fill="#7d6608">⚠ Mirror constraint</text>
  <text x="540" y="644" text-anchor="middle" font-size="10" fill="#7d6608">Strips 1+2 (front) and 3+4 (back) never lit simultaneously</text>
</svg>
